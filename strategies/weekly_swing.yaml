# MYRA Weekly Strategy: Institutional Squeeze
metadata:
  name: "Institutional_Accumulation"
  regime: "Swing"

# Pull these levers to filter the market
filters:
  volatility:
    max_compression_score: 0.70  # Lower = tighter base
  delivery:
    min_delivery_divergence: 1.25 # Higher = more institutional buying
  volume:
    min_relative_volume: 1.50     # Higher = more active interest
  alpha:
    min_nifty_outperformance: 0.01 # Must be beating the index