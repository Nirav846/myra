repos:
  # 1. Code Formatter: Ensures your code looks clean and consistent
  - repo: https://github.com/psf/black
    rev: 23.3.0  # Updated to a more stable 2023 version
    hooks:
      - id: black

  # 2. Linter: Catches unused imports and basic syntax mistakes
  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8

  # 3. Custom Logic: Your specific MYRA Performance rules
  - repo: local
    hooks:
      - id: performance-guard
        name: "🚀 MYRA Performance Guard"
        # IMPORTANT: Ensure this path matches your folder structure!
        entry: python tools/performance_guard.py 
        language: system
        types: [python]
        pass_filenames: false
        always_run: true