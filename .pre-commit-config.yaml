repos:
  - repo: https://github.com/psf/black
    rev: 23.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/flake8
    rev: 6.0
    hooks:
      - id: flake8

  - repo: local
    hooks:
      - id: performance-guard
        name: "🚀 MYRA Performance Guard"
        entry: python tools/performance_guard.py
        language: system
        types: [python]
        pass_filenames: false
