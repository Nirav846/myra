name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run flake8 linting
      run: |
        flake8 myra_app/ --max-line-length=120 --ignore=E203,W503 || true

    - name: Run bandit security scan
      run: |
        bandit -r myra_app/ -f json -o bandit-report.json || true

    - name: Run pytest tests
      run: |
        pytest tests/ --tb=short --verbose || true

  frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      working-directory: ./myra_web
      run: |
        npm ci

    - name: Run TypeScript compilation
      working-directory: ./myra_web
      run: |
        npx tsc --noEmit || true

    - name: Run ESLint
      working-directory: ./myra_web
      run: |
        npx eslint src/ --ext .ts,.tsx || true

  test-results:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          bandit-report.json
          test-results/
        retention-days: 30
